<!--
  Szablon EmailJS: "Powiadomienie (do mnie)" -> templateId
  Wspólny dla OBU formularzy: zgłoszenia na zajęcia i formularza kontaktowego
  (bo darmowy plan EmailJS pozwala tylko na 2 szablony).

  Ustawienia w zakładce Settings tego szablonu w panelu EmailJS:
    Subject:  {{subject}}
    To Email: e.edukacyjna.przystan@gmail.com
    Reply To: {{reply_to}}
  Poniższy kod wklej w edytorze szablonu (przełącz na widok "Code editor").
-->
<div style="background-color:#FAFAF7;padding:24px 12px;font-family:'Quicksand',Arial,sans-serif;color:#24262B;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:560px;margin:0 auto;background:#FFFFFF;border-radius:16px;overflow:hidden;border:1px solid #E7E5E0;">
    <tr>
      <td style="background:#2F6FED;padding:20px 28px;">
        <span style="font-family:'Baloo 2',Arial,sans-serif;font-size:20px;font-weight:700;color:#FFFFFF;">Edukacyjna Przystań</span>
      </td>
    </tr>
    <tr>
      <td style="padding:28px;">
        <p style="margin:0 0 4px;font-size:13px;letter-spacing:.02em;text-transform:uppercase;color:#2F6FED;font-weight:700;">{{badge}}</p>
        <h1 style="margin:0 0 20px;font-family:'Baloo 2',Arial,sans-serif;font-size:22px;color:#24262B;">{{title}}</h1>

        <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="border-collapse:collapse;background:#E7EFFE;border-radius:12px;">
          <tr>
            <td style="padding:18px 20px;font-size:15px;line-height:1.8;color:#24262B;white-space:pre-line;">{{content}}</td>
          </tr>
        </table>

        <p style="margin:24px 0 0;font-size:13px;color:#5B5F6B;">Odpowiedz na tego maila, aby napisać bezpośrednio do nadawcy (Reply-To ustawione automatycznie).</p>
      </td>
    </tr>
  </table>
</div>
